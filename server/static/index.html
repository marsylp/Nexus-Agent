<!DOCTYPE html>
<html lang="zh-CN" data-theme="dark">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>◈ Nexus Agent</title>
<meta name="description" content="Nexus Agent — AI 专家枢纽，162 个角色智能匹配">
<link rel="stylesheet" href="/static/style.css">
</head>
<body>

<header>
  <h1><span class="brand-logo">◈</span> Nexus Agent</h1>
  <span class="badge" id="version-badge">...</span>
  <span id="role-badge"></span>
  <div class="header-actions">
    <button id="roles-btn" class="icon-btn" title="选择专家角色">👥</button>
    <button id="collab-btn" class="icon-btn" title="协作模式" id="collab-toggle">🤝</button>
    <button id="settings-btn" class="icon-btn" title="设置">⚙️</button>
    <div class="theme-toggle"><button data-theme="light">☀️</button><button data-theme="dark" class="active">🌙</button></div>
    <span id="status-dot"></span>
  </div>
</header>

<div id="messages">
  <div id="welcome" class="welcome">
    <div class="welcome-icon" style="font-size:56px;background:linear-gradient(135deg,#6C5CE7,#a29bfe);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;">◈</div>
    <h2>Nexus Agent</h2>
    <p>你的 AI 专家枢纽。输入任何问题，自动匹配 162 个专家角色中最合适的来回答。</p>
  </div>
</div>

<div id="input-area">
  <div class="input-wrapper">
    <textarea id="input" placeholder="输入消息... (Enter 发送, Shift+Enter 换行)" rows="1"></textarea>
    <button id="send-btn" disabled>
      <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M22 2L11 13M22 2l-7 20-4-9-9-4 20-7z"/></svg>
    </button>
  </div>
</div>


<!-- 角色选择面板 -->
<div id="roles-panel" class="panel" style="display:none">
  <div class="panel-header">
    <h3>👥 选择专家角色</h3>
    <button class="panel-close" onclick="closePanels()">✕</button>
  </div>
  <div class="panel-body">
    <input type="search" id="role-search" class="panel-search" placeholder="搜索角色...">
    <button id="auto-mode-btn" class="auto-mode-btn">🤖 自动匹配模式</button>
    <div id="role-groups"></div>
  </div>
</div>

<!-- 设置面板 -->
<div id="settings-panel" class="panel" style="display:none">
  <div class="panel-header">
    <h3>⚙️ 设置</h3>
    <button class="panel-close" onclick="closePanels()">✕</button>
  </div>
  <div class="panel-body">
    <div class="settings-section">
      <h4>🤖 模型选择</h4>
      <p class="settings-hint">选择对话使用的模型。"自动路由"会根据问题复杂度自动选择最合适的模型。</p>
      <select id="model-select" class="model-select">
        <option value="auto" selected>🔄 自动路由（推荐）</option>
      </select>
      <div id="model-status" class="model-status"></div>
    </div>
    <div class="settings-section">
      <h4>🔑 API Key 配置</h4>
      <p class="settings-hint">Key 仅存储在你的浏览器中，不会上传到任何服务器。填入任意一个即可使用。</p>
      <div class="key-fields">
        <label class="key-field"><span>Anthropic <em>Claude</em></span><input type="password" data-key="ANTHROPIC_API_KEY" placeholder="sk-ant-..." autocomplete="off"></label>
        <label class="key-field"><span>Baichuan <em>百川智能</em></span><input type="password" data-key="BAICHUAN_API_KEY" placeholder="API Key" autocomplete="off"></label>
        <label class="key-field"><span>Cohere <em>Command R</em></span><input type="password" data-key="COHERE_API_KEY" placeholder="API Key" autocomplete="off"></label>
        <label class="key-field"><span>DeepSeek <em>深度求索</em></span><input type="password" data-key="DEEPSEEK_API_KEY" placeholder="sk-..." autocomplete="off"></label>
        <label class="key-field"><span>Doubao <em>豆包 · 字节跳动</em></span><input type="password" data-key="DOUBAO_API_KEY" placeholder="API Key" autocomplete="off"></label>
        <label class="key-field"><span>Google <em>Gemini</em></span><input type="password" data-key="GOOGLE_API_KEY" placeholder="AIza..." autocomplete="off"></label>
        <label class="key-field"><span>Groq <em>Llama 3</em></span><input type="password" data-key="GROQ_API_KEY" placeholder="gsk_..." autocomplete="off"></label>
        <label class="key-field"><span>MiniMax</span><input type="password" data-key="MINIMAX_API_KEY" placeholder="API Key" autocomplete="off"></label>
        <label class="key-field"><span>Mistral</span><input type="password" data-key="MISTRAL_API_KEY" placeholder="API Key" autocomplete="off"></label>
        <label class="key-field"><span>Moonshot <em>月之暗面</em></span><input type="password" data-key="MOONSHOT_API_KEY" placeholder="sk-..." autocomplete="off"></label>
        <label class="key-field"><span>OpenAI <em>GPT-4o</em></span><input type="password" data-key="OPENAI_API_KEY" placeholder="sk-..." autocomplete="off"></label>
        <label class="key-field"><span>OpenRouter</span><input type="password" data-key="OPENROUTER_API_KEY" placeholder="sk-or-..." autocomplete="off"></label>
        <label class="key-field"><span>Qwen <em>通义千问</em></span><input type="password" data-key="QWEN_API_KEY" placeholder="sk-..." autocomplete="off"></label>
        <label class="key-field"><span>SiliconFlow <em>硅基流动</em></span><input type="password" data-key="SILICON_API_KEY" placeholder="sk-..." autocomplete="off"></label>
        <label class="key-field"><span>StepFun <em>阶跃星辰</em></span><input type="password" data-key="STEPFUN_API_KEY" placeholder="API Key" autocomplete="off"></label>
        <label class="key-field"><span>Together AI</span><input type="password" data-key="TOGETHER_API_KEY" placeholder="API Key" autocomplete="off"></label>
        <label class="key-field"><span>xAI <em>Grok</em></span><input type="password" data-key="XAI_API_KEY" placeholder="xai-..." autocomplete="off"></label>
        <label class="key-field"><span>Yi <em>零一万物</em></span><input type="password" data-key="YI_API_KEY" placeholder="API Key" autocomplete="off"></label>
        <label class="key-field"><span>Zhipu <em>智谱 · GLM-4</em></span><input type="password" data-key="ZHIPU_API_KEY" placeholder="API Key" autocomplete="off"></label>
      </div>
      <div class="key-actions">
        <button id="save-keys-btn" class="btn-primary">保存 Key</button>
        <button id="clear-keys-btn" class="btn-danger">清除所有 Key</button>
      </div>
    </div>
    <div class="settings-section">
      <h4>💻 本地模型 (Ollama)</h4>
      <p class="settings-hint">无需 API Key。确保 Ollama 已在本地运行。</p>
      <div class="key-fields">
        <label class="key-field"><span>服务地址</span><input type="text" id="ollama-url" data-key="OLLAMA_BASE_URL" placeholder="http://localhost:11434" autocomplete="off"></label>
        <label class="key-field"><span>模型名称</span><input type="text" id="ollama-model" data-key="OLLAMA_MODEL" placeholder="qwen2.5:7b" autocomplete="off"></label>
      </div>
      <button id="test-ollama-btn" class="btn-primary" style="margin-top:var(--space-3);width:100%">测试连接</button>
    </div>
  </div>
</div>

<!-- 遮罩 -->
<div id="panel-overlay" class="panel-overlay" style="display:none" onclick="closePanels()"></div>

<script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/dompurify@3/dist/purify.min.js"></script>
<script src="/static/app.js"></script>
</body>
</html>
